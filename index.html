    header h1 {

    header p {

      animation: fadeIn 2s ease-in;
    }

    .cta-buttons {

      flex-wrap: wrap;
      justify-content: center;
    }

    .cta-buttons a {

      font-weight: 600;
      border-radius: 30px;

      transition: transform 0.3s ease, box-shadow 0.3s ease;

    .cta-buttons a:hover {

    .feature {

      border-radius: 16px;
      border: 1px solid #2c2c2c;

    }

    .feature:hover {
      transform: translateY(-10px);
      border-color: #ff6a00;
    }

    .feature h3 {
      font-size: 1.5rem;
      color: #ffa07a;
      margin-bottom: 15px;
    }

    .feature p {

      color: #bbb;

    footer {
      text-align: center;

      background: #0d0d0d;
      color: #666;
      font-size: 0.9rem;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 768px) {
      header h1 {

    /* ── NAVBAR TOP RIGHT ── */

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<!-- TOP RIGHT NAVBAR -->
<div id="top-nav">
  <a href="globaya-premium.html" class="nav-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    Abonnement
  </a>
  <button class="nav-btn pro" id="auth-nav-btn" onclick="toggleUserMenu()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span id="auth-nav-label">Mon compte</span>
  </button>
</div>

<!-- USER DROPDOWN -->
<div id="user-dropdown">
  <div class="udrop-email" id="udrop-email"></div>
  <div class="udrop-item" onclick="window.location.href='profil.html'">👤 Mon Profil</div>
  <div class="udrop-item udrop-upgrade" id="udrop-sub" onclick="window.location.href='globaya-premium.html'">⭐ Mon Abonnement</div>
  <div class="udrop-item udrop-out" onclick="doSignOut()">Se déconnecter</div>
</div>

<script>
(function() {
  const SURL = 'https://tgayelchkhdioudodxul.supabase.co';
  const SKEY = 'sb_publishable_Ef6DJ4aYuJmCUGW_e_6MDQ_Zy3EMIun';
  const sb   = supabase.createClient(SURL, SKEY);

  let _user = null, _isPro = false;

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) await setUser(session.user);
    else setGuest();

    sb.auth.onAuthStateChange(async (event, session) => {
      if (session?.user) await setUser(session.user);
      else setGuest();
    });
  }

  async function setUser(user) {
    _user = user;
    try {
      const { data } = await sb.from('subscribers').select('status,plan').eq('id', user.id).single();
      _isPro = !!(data && data.status === 'active');
    } catch(e) { _isPro = false; }

    const btn   = document.getElementById('auth-nav-btn');
    const label = document.getElementById('auth-nav-label');
    const sub   = document.getElementById('udrop-sub');
    document.getElementById('udrop-email').textContent = user.email;

    if (_isPro) {
      btn.className   = 'nav-btn connected';
      label.textContent = '✦ Pro';
      sub.textContent = '✦ Abonnement Pro actif';
      sub.className   = 'udrop-item udrop-pro';
      sub.onclick     = () => window.location.href = 'profil.html';
    } else {
      btn.className   = 'nav-btn pro';
      label.textContent = '👤 Mon compte';
      sub.textContent = '⭐ Passer à Pro';
      sub.className   = 'udrop-item udrop-upgrade';
      sub.onclick     = () => window.location.href = 'globaya-premium.html';
    }
  }

  function setGuest() {
    _user = null; _isPro = false;
    const btn = document.getElementById('auth-nav-btn');
    btn.className = 'nav-btn pro';
    document.getElementById('auth-nav-label').textContent = 'Se connecter';
    btn.onclick = () => window.location.href = 'profil.html';
  }

  window.toggleUserMenu = function() {
    if (!_user) { window.location.href = 'Nomadia.html'; return; }
    const dd = document.getElementById('user-dropdown');
    dd.classList.toggle('open');
    if (dd.classList.contains('open')) {
      setTimeout(() => document.addEventListener('click', function h(e) {
        if (!dd.contains(e.target) && e.target.id !== 'auth-nav-btn') {
          dd.classList.remove('open');
          document.removeEventListener('click', h);
        }
      }), 50);
    }
  };

  window.doSignOut = async function() {
    await sb.auth.signOut();
    setGuest();
    document.getElementById('user-dropdown').classList.remove('open');
  };

  init();
})();
</script>
