<html lang="fr">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Outfit', sans-serif; background: #121212; color: #fff; overflow: hidden; }

    /* ── NAVBAR ── */
    #navbar {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 1000;
      display: flex; align-items: center; gap: 10px;
      background: rgba(28, 28, 28, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50px;
      padding: 8px 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    }

    /* Bouton Accueil */
    #accueil-button {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 18px;
      background: transparent;
      color: #ccc;
      border: none; border-radius: 50px;
      cursor: pointer; font-size: 0.95rem;
      text-decoration: none; font-family: 'Outfit', sans-serif; font-weight: 600;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    #accueil-button:hover { background: rgba(255,255,255,0.08); color: #fff; }
    #accueil-button svg { flex-shrink: 0; }

    /* Séparateur */
    .nav-sep {
      width: 1px; height: 22px;
      background: rgba(255,255,255,0.12);
      flex-shrink: 0;
    }

    /* Dropdown Explorer */
    .dropdown-container { position: relative; }
    .dropdown { position: relative; display: inline-block; }

    .dropdown-button {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 18px; font-size: 0.95rem; font-weight: 600;
      border-radius: 50px;
      background: #ff6a00;
      color: #fff;
      border: none; cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      font-family: 'Outfit', sans-serif;
    }
    .dropdown-button:hover { background: #e05a00; }
    .dropdown-button svg { flex-shrink: 0; }

    .dropdown-content {
      display: none; position: absolute; background: #1f1f1f;
      min-width: 220px; border-radius: 12px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.07);
      z-index: 10; top: calc(100% + 10px); left: 50%;
      transform: translateX(-50%);
      max-height: 600px; overflow-y: auto;
    }

    .dropdown-content .section {
      padding: 12px 16px; font-size: 1rem; color: #fff;
      background: #2c2c2c; border-bottom: 1px solid #3c3c3c;
      cursor: pointer; transition: background 0.3s ease;
    }
    .dropdown-content .section:hover { background: #ff6a00; }

    .dropdown-content .countries { display: none; padding-left: 20px; background: #1a1a1a; }
    .dropdown-content .countries.show { display: block; }

    .dropdown-content .country { padding: 10px 20px; font-size: 0.9rem; color: #ccc; cursor: pointer; }
    .dropdown-content .country:hover { background: #ff99cc; color: #fff; }

    .dropdown-content .cities { display: none; padding-left: 30px; background: #252525; }
    .dropdown-content .cities.show { display: block; }

    .dropdown-content .city { padding: 8px 30px; font-size: 0.85rem; color: #ddd; cursor: pointer; }
    .dropdown-content .city:hover { background: #ff99cc; color: #fff; }

    .dropdown-content .items { display: none; padding-left: 40px; background: #1a1a1a; }
    .dropdown-content .items.show { display: block; }

    .dropdown-content .item { padding: 8px 40px; font-size: 0.8rem; color: #bbb; cursor: pointer; }
    .dropdown-content .item:hover { background: #ff99cc; color: #fff; }

    .leaflet-popup-content-wrapper { background: #1f1f1f; color: #fff; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
    .leaflet-popup-content { font-family: 'Outfit', sans-serif; font-size: 0.9rem; padding: 10px; }
    .leaflet-popup-content a { color: #ff6a00; text-decoration: none; font-weight: 600; }
    .leaflet-popup-content a:hover { color: #ff99cc; }
    .leaflet-popup-tip { background: #1f1f1f; }

    .map-container { width: 100%; height: 100vh; position: relative; }
    #map { width: 100%; height: 100%; background: #1f1f1f; }

    /* Bouton Favoris dans navbar */
    #favoris-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 18px;
      background: transparent;
      color: #ccc;
      border: none; border-radius: 50px;
      cursor: pointer; font-size: 0.95rem;
      font-family: 'Outfit', sans-serif; font-weight: 600;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    #favoris-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    #favoris-badge {
      background: #ff6a00; color: white; border-radius: 50%;
      width: 20px; height: 20px; font-size: 11px;
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; margin-left: 2px;
    }

    #favoris-panel {
      position: fixed; top: 0; right: -380px; width: 360px; height: 100vh;
      background: #1f1f1f; z-index: 2000;
      box-shadow: -4px 0 20px rgba(0,0,0,0.5); transition: right 0.3s ease;
      display: flex; flex-direction: column; font-family: 'Outfit', sans-serif;
    }
    #favoris-panel.open { right: 0; }
    #favoris-panel-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px; background: #2c2c2c; border-bottom: 1px solid #3c3c3c;
    }
    #favoris-panel-header h2 { font-size: 1.2rem; color: #ff6a00; margin: 0; }
    #close-favoris { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; line-height: 1; }
    #close-favoris:hover { color: #ff6a00; }
    #favoris-list { flex: 1; overflow-y: auto; padding: 16px; }
    #favoris-vide { color: #888; text-align: center; margin-top: 40px; font-size: 0.95rem; }
    .favori-item {
      background: #2c2c2c; border-radius: 8px; padding: 12px 14px;
      margin-bottom: 10px; display: flex; justify-content: space-between;
      align-items: center; gap: 10px;
    }
    .favori-info { flex: 1; }
    .favori-nom { font-weight: 600; font-size: 0.95rem; color: #fff; }
    .favori-type { font-size: 0.78rem; color: #ff6a00; margin-top: 2px; }
    .favori-actions { display: flex; gap: 8px; }
    .favori-voir {
      background: #ff6a00; color: white; border: none; border-radius: 5px;
      padding: 5px 10px; font-size: 0.78rem; cursor: pointer;
      font-family: 'Outfit', sans-serif; text-decoration: none; display: inline-block;
    }
    .favori-voir:hover { background: #e05500; }
    .favori-suppr { background: #3c3c3c; color: #ff4444; border: none; border-radius: 5px; padding: 5px 8px; font-size: 0.85rem; cursor: pointer; }
    .favori-suppr:hover { background: #ff4444; color: white; }
    #favoris-footer { padding: 16px; border-top: 1px solid #3c3c3c; }
    #vider-favoris {
      width: 100%; padding: 10px; background: #3c3c3c; color: #ff4444;
      border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem;
      font-family: 'Outfit', sans-serif; transition: background 0.2s;
    }
    #vider-favoris:hover { background: #ff4444; color: white; }
    .item-favori-btn { float: right; background: none; border: none; cursor: pointer; font-size: 1rem; line-height: 1; color: #888; padding: 0 0 0 6px; transition: color 0.2s; }
    .item-favori-btn:hover { color: #ff6a00; }
    .item-favori-btn.actif { color: #ff6a00; }

    @media (max-width: 600px) {
      #navbar { top: 10px; padding: 6px 8px; gap: 6px; }
      #accueil-button, #favoris-btn { padding: 8px 12px; font-size: 0.85rem; }
      .dropdown-button { padding: 8px 14px; font-size: 0.85rem; }
      #accueil-button span.nav-label, #favoris-btn span.nav-label { display: none; }
    }

// ============================================================
// GÉNÉRATION AUTOMATIQUE DU DROPDOWN HTML
// ============================================================

function slugify(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
}

function buildDropdown() {
  const dropdown = document.getElementById('main-dropdown');

  // ── Section PAYS ──
  const secPays = buildSection('pays', 'Pays');
  const countriesPays = document.createElement('div');
  countriesPays.className = 'countries';
  countriesPays.id = 'pays-countries';

  for (const [pays, data] of Object.entries(DATA)) {
    const paysId = slugify(pays);
    const countryEl = document.createElement('div');
    countryEl.className = 'country';
    countryEl.dataset.id = paysId;
    countryEl.dataset.coords = data.coords.join(',');
    countryEl.textContent = pays;
    countriesPays.appendChild(countryEl);

    const citiesEl = document.createElement('div');
    citiesEl.className = 'cities';
    citiesEl.id = `${paysId}-cities`;

    for (const [ville, vData] of Object.entries(data.villes)) {
      const cityEl = document.createElement('div');
      cityEl.className = 'city';
      cityEl.dataset.coords = vData.coords.join(',');
      cityEl.textContent = ville;
      citiesEl.appendChild(cityEl);
    }
    countriesPays.appendChild(citiesEl);
  }
  dropdown.appendChild(secPays);
  dropdown.appendChild(countriesPays);

  // ── Section ACTIVITÉS ──
  const secAct = buildSection('activites', 'Activités');
  const countriesAct = document.createElement('div');
  countriesAct.className = 'countries';
  countriesAct.id = 'activites-countries';

  for (const [pays, data] of Object.entries(DATA)) {
    const paysId = slugify(pays);
    const countryEl = document.createElement('div');
    countryEl.className = 'country';
    countryEl.dataset.id = `${paysId}-activites`;
    countryEl.dataset.coords = data.coords.join(',');
    countryEl.textContent = pays;
    countriesAct.appendChild(countryEl);

    const citiesEl = document.createElement('div');
    citiesEl.className = 'cities';
    citiesEl.id = `${paysId}-activites-cities`;

    for (const [ville, vData] of Object.entries(data.villes)) {
      const villeId = slugify(pays + '-' + ville);
      const cityEl = document.createElement('div');
      cityEl.className = 'city';
      cityEl.dataset.id = `${villeId}-activites`;
      cityEl.dataset.coords = vData.coords.join(',');
      cityEl.textContent = ville;
      citiesEl.appendChild(cityEl);

      const itemsEl = document.createElement('div');
      itemsEl.className = 'items';
      itemsEl.id = `${villeId}-activites-items`;

      for (const act of vData.activites) {
        itemsEl.appendChild(buildItem(act, 'activity'));
      }
      citiesEl.appendChild(itemsEl);
    }
    countriesAct.appendChild(citiesEl);
  }
  dropdown.appendChild(secAct);
  dropdown.appendChild(countriesAct);

  // ── Section HÔTELS ──
  const secHot = buildSection('hotels', 'Hôtels');
  const countriesHot = document.createElement('div');
  countriesHot.className = 'countries';
  countriesHot.id = 'hotels-countries';

  for (const [pays, data] of Object.entries(DATA)) {
    const paysId = slugify(pays);
    const countryEl = document.createElement('div');
    countryEl.className = 'country';
    countryEl.dataset.id = `${paysId}-hotels`;
    countryEl.dataset.coords = data.coords.join(',');
    countryEl.textContent = pays;
    countriesHot.appendChild(countryEl);

    const citiesEl = document.createElement('div');
    citiesEl.className = 'cities';
    citiesEl.id = `${paysId}-hotels-cities`;

    for (const [ville, vData] of Object.entries(data.villes)) {
      const villeId = slugify(pays + '-' + ville);
      const cityEl = document.createElement('div');
      cityEl.className = 'city';
      cityEl.dataset.id = `${villeId}-hotels`;
      cityEl.dataset.coords = vData.coords.join(',');
      cityEl.textContent = ville;
      citiesEl.appendChild(cityEl);

      const itemsEl = document.createElement('div');
      itemsEl.className = 'items';
      itemsEl.id = `${villeId}-hotels-items`;

      for (const hotel of vData.hotels) {
        itemsEl.appendChild(buildItem(hotel, 'hotel'));
      }
      citiesEl.appendChild(itemsEl);
    }
    countriesHot.appendChild(citiesEl);
  }
  dropdown.appendChild(secHot);
  dropdown.appendChild(countriesHot);
}

function buildSection(id, label) {
  const el = document.createElement('div');
  el.className = 'section';
  el.dataset.id = id;
  el.textContent = label;
  return el;
}

function buildItem(data, type) {
  const el = document.createElement('div');
  el.className = 'item';
  el.dataset.coords = data.coords.join(',');
  el.dataset.type = type;
  el.dataset.url = data.url;
  el.textContent = data.nom;
  return el;
}

// Construire le dropdown au chargement
buildDropdown();

document.addEventListener('DOMContentLoaded', () => {
  const map = L.map('map', {
    minZoom: 2, maxZoom: 18,
    maxBounds: [[-90, -180], [90, 180]],
    maxBoundsViscosity: 1.0
  }).setView([48.8566, 2.3522], 5);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);

  // ── Icônes personnalisées ──
  const cityIcon = L.divIcon({
    className: 'city-marker',
    html: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#ff6a00"/><circle cx="12" cy="9" r="2" fill="#ff99cc"/></svg>`,
    iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32]
  });
  const activityIcon = L.divIcon({
    className: 'activity-marker',
    html: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#00b7eb"/><circle cx="12" cy="9" r="2" fill="#80d8ff"/></svg>`,
    iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32]
  });
  const hotelIcon = L.divIcon({
    className: 'hotel-marker',
    html: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#8b008b"/><circle cx="12" cy="9" r="2" fill="#c71585"/></svg>`,
    iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32]
  });

  // ── Cluster group avec couleurs personnalisées ──
  const clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 60,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true,
    iconCreateFunction: function(cluster) {
      const count = cluster.getChildCount();
      let size, color, textColor;
      if (count < 10) {
        size = 36; color = '#6dbf67'; textColor = '#1a4d17';
      } else if (count < 20) {
        size = 44; color = '#f0c040'; textColor = '#5a3d00';
      } else {
        size = 52; color = '#f07830'; textColor = '#5a1e00';
      }
      return L.divIcon({
        html: `<div style="
          width:${size}px; height:${size}px;
          background:${color};
          border-radius:50%;
          display:flex; align-items:center; justify-content:center;
          font-family:'Outfit',sans-serif;
          font-size:${size > 40 ? 15 : 13}px;
          font-weight:700;
          color:${textColor};
          border: 3px solid rgba(255,255,255,0.85);
          box-shadow: 0 2px 8px rgba(0,0,0,0.35);
        ">${count}</div>`,
        className: '',
        iconSize: [size, size],
        iconAnchor: [size/2, size/2]
      });
    }
  });

  // ── Pré-charger TOUS les marqueurs activités + hôtels dans le cluster ──
  for (const [pays, pData] of Object.entries(DATA)) {
    for (const [ville, vData] of Object.entries(pData.villes)) {
      // Activités
      for (const act of vData.activites) {
        const marker = L.marker(act.coords, { icon: activityIcon });
        marker.bindPopup(`
          <div>
            <strong>${act.nom}</strong><br>
            🎯 Activité · ${ville}, ${pays}<br>
            <a href="${act.url}" target="_blank">Visiter le site</a>
          </div>`);
        clusterGroup.addLayer(marker);
      }
      // Hôtels
      for (const hotel of vData.hotels) {
        const marker = L.marker(hotel.coords, { icon: hotelIcon });
        marker.bindPopup(`
          <div>
            <strong>${hotel.nom}</strong><br>
            🏨 Hôtel · ${ville}, ${pays}<br>
            <a href="${hotel.url}" target="_blank">Visiter le site</a>
          </div>`);
        clusterGroup.addLayer(marker);
      }
    }
  }

  map.addLayer(clusterGroup);

  // ── Marqueur de sélection (dropdown) ──
  let currentMarker = null;

  const dropdownButton = document.querySelector('.dropdown-button');
  const dropdownContent = document.querySelector('.dropdown-content');

  dropdownButton.addEventListener('click', () => {
    const isExpanded = dropdownButton.getAttribute('aria-expanded') === 'true';
    dropdownButton.setAttribute('aria-expanded', !isExpanded);
    dropdownContent.style.display = isExpanded ? 'none' : 'block';
  });

  // Sections
  document.querySelectorAll('.section').forEach(section => {
    section.addEventListener('click', () => {
      const sectionId = section.dataset.id;
      const countriesEl = document.getElementById(`${sectionId}-countries`);
      const isShown = countriesEl.classList.contains('show');
      document.querySelectorAll('.countries, .cities, .items').forEach(el => el.classList.remove('show'));
      if (!isShown) countriesEl.classList.add('show');
    });
  });

  // Pays
  document.querySelectorAll('.country').forEach(country => {
    country.addEventListener('click', () => {
      const countryId = country.dataset.id;
      const citiesEl = document.getElementById(`${countryId}-cities`);
      const isShown = citiesEl && citiesEl.classList.contains('show');
      document.querySelectorAll('.cities, .items').forEach(el => el.classList.remove('show'));
      if (citiesEl && !isShown) citiesEl.classList.add('show');
      const coords = country.dataset.coords.split(',').map(Number);
      map.setView(coords, 5);
      if (currentMarker) map.removeLayer(currentMarker);
      currentMarker = L.marker(coords, { icon: cityIcon }).addTo(map)
        .bindPopup(`<strong>${country.textContent}</strong>`).openPopup();
    });
  });

  // Villes
  document.querySelectorAll('.city').forEach(city => {
    city.addEventListener('click', () => {
      const coords = city.dataset.coords.split(',').map(Number);
      const cityId = city.dataset.id;
      const itemsEl = cityId ? document.getElementById(`${cityId}-items`) : null;
      const isShown = itemsEl && itemsEl.classList.contains('show');
      document.querySelectorAll('.items').forEach(el => el.classList.remove('show'));
      if (itemsEl && !isShown) itemsEl.classList.add('show');
      map.setView(coords, 10);
      if (currentMarker) map.removeLayer(currentMarker);
      currentMarker = L.marker(coords, { icon: cityIcon }).addTo(map)
        .bindPopup(`<strong>${city.textContent}</strong>`).openPopup();
    });
  });

  // Items (dropdown) → zoom + popup directe
  document.querySelectorAll('.item').forEach(item => {
    item.addEventListener('click', () => {
      const coords = item.dataset.coords.split(',').map(Number);
      const type = item.dataset.type;
      const url = item.dataset.url || '#';
      const icon = type === 'activity' ? activityIcon : hotelIcon;
      map.setView(coords, 15);
      if (currentMarker) map.removeLayer(currentMarker);
      currentMarker = L.marker(coords, { icon }).addTo(map)
        .bindPopup(`<div><strong>${item.textContent.trim()}</strong><br>${type === 'activity' ? '🎯 Activité' : '🏨 Hôtel'}<br><a href="${url}" target="_blank">Visiter le site</a></div>`)
        .openPopup();
    });
  });

  // Fermer au clic extérieur
  document.addEventListener('click', (event) => {
    if (!dropdownButton.contains(event.target) && !dropdownContent.contains(event.target)) {
      dropdownContent.style.display = 'none';
      dropdownButton.setAttribute('aria-expanded', 'false');
      document.querySelectorAll('.countries, .cities, .items').forEach(el => el.classList.remove('show'));
    }
  });
});

let favoris = JSON.parse(localStorage.getItem('nomadia-favoris') || '[]');

function sauvegarderFavoris() { localStorage.setItem('nomadia-favoris', JSON.stringify(favoris)); }
function mettreAJourBadge() { document.getElementById('favoris-badge').textContent = favoris.length; }
function estEnFavori(nom) { return favoris.some(f => f.nom === nom); }

function renderFavoris() {
  const list = document.getElementById('favoris-list');
  const vide = document.getElementById('favoris-vide');
  list.querySelectorAll('.favori-item').forEach(i => i.remove());
  if (favoris.length === 0) {
    vide.style.display = 'block';
  } else {
    vide.style.display = 'none';
    favoris.forEach((fav, index) => {
      const el = document.createElement('div');
      el.className = 'favori-item';
      el.innerHTML = `
        <div class="favori-info">
          <div class="favori-nom">${fav.nom}</div>
          <div class="favori-type">${fav.type === 'activity' ? '🎯 Activité' : '🏨 Hôtel'}</div>
        </div>
        <div class="favori-actions">
          <a class="favori-voir" href="${fav.url}" target="_blank">Voir</a>
          <button class="favori-suppr" data-index="${index}">✕</button>
        </div>`;
      list.appendChild(el);
    });
    list.querySelectorAll('.favori-suppr').forEach(btn => {
      btn.addEventListener('click', (e) => {
        favoris.splice(parseInt(e.target.dataset.index), 1);
        sauvegarderFavoris(); mettreAJourBadge(); renderFavoris(); mettreAJourBoutonsFavoris();
      });
    });
  }
}

function mettreAJourBoutonsFavoris() {
  document.querySelectorAll('.item-favori-btn').forEach(btn => {
    const nom = btn.dataset.nom;
    btn.classList.toggle('actif', estEnFavori(nom));
    btn.textContent = estEnFavori(nom) ? '❤' : '🤍';
  });
}

// Boutons ❤ sur chaque item
document.querySelectorAll('.item').forEach(item => {
  const nom = item.textContent.trim();
  const type = item.dataset.type;
  const url = item.dataset.url || '#';
  const coords = item.dataset.coords;
  const btn = document.createElement('button');
  btn.className = 'item-favori-btn';
  btn.dataset.nom = nom;
  btn.textContent = estEnFavori(nom) ? '❤' : '🤍';
  btn.title = 'Ajouter aux favoris';
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (estEnFavori(nom)) {
      favoris = favoris.filter(f => f.nom !== nom);
    } else {
      favoris.push({ nom, type, url, coords });
    }
    sauvegarderFavoris(); mettreAJourBadge(); renderFavoris(); mettreAJourBoutonsFavoris();
  });
  item.appendChild(btn);
});

document.getElementById('favoris-btn').addEventListener('click', () => {
  document.getElementById('favoris-panel').classList.toggle('open');
});
document.getElementById('close-favoris').addEventListener('click', () => {
  document.getElementById('favoris-panel').classList.remove('open');
});
document.getElementById('vider-favoris').addEventListener('click', () => {
